services:
  identity:
    build:
      context: ./Identity
      dockerfile: Dockerfile
    container_name: sorsabsa-identity
    env_file: ./Identity/.env
    ports:
      - "8000:8000"
    networks:
      - sorsabsa-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  accounting:
    build:
      context: ./Contabilidad
      dockerfile: Dockerfile
    container_name: sorsabsa-accounting
    env_file: ./Contabilidad/.env
    ports:
      - "8001:8001"
    networks:
      - sorsabsa-net
    depends_on:
      identity:
        condition: service_healthy

  forensic:
    build:
      context: ./peritajes-forenses
      dockerfile: Dockerfile
    container_name: sorsabsa-forensic
    env_file: ./peritajes-forenses/.env
    ports:
      - "8004:8000"
    networks:
      - sorsabsa-net
    depends_on:
      identity:
        condition: service_healthy

  convertidor:
    build:
      context: ./CONVERTIDOR
      dockerfile: Dockerfile
    container_name: sorsabsa-convertidor
    networks:
      - sorsabsa-net
    ports:
      - "8005:8000"
    volumes:
      - ./CONVERTIDOR:/app
    # El comando se define en el Dockerfile para instalar dependencias en el build
    working_dir: /app

  condomanager:
    build:
      context: ./condomanager-saas
      dockerfile: Dockerfile
    container_name: sorsabsa-condomanager
    env_file: ./condomanager-saas/.env
    ports:
      - "5173:5173"
    networks:
      - sorsabsa-net
    depends_on:
      identity:
        condition: service_healthy
      convertidor:
        condition: service_started
    volumes:
      - ./condomanager-saas:/app
      - /app/node_modules

  # --- PLATAFORMA TRANSVERSAL ---
  conector:
    build:
      context: ./Conector
      dockerfile: Dockerfile
    container_name: sorsabsa-conector
    env_file: ./Conector/.env
    ports:
      - "8006:8000" # Mapeo externo 8006 para evitar conflictos locales
    volumes:
      - ./Conector:/app
      - /app/node_modules
      - /app/venv
      - ./MemoryPalace/memory/knowledge:/app/knowledge:ro
    networks:
      - sorsabsa-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  scrapling:
    build:
      context: ./Scrapling
    container_name: sorsabsa-scrapling
    env_file: ./Scrapling/.env
    volumes:
      - ./Scrapling:/app
      - /app/venv
      - ./MemoryPalace/memory:/app/memory_palace:rw
    networks:
      - sorsabsa-net

  memorypalace:
    build:
      context: ./MemoryPalace
    container_name: sorsabsa-memorypalace
    volumes:
      - ./MemoryPalace:/app
    networks:
      - sorsabsa-net

  # --- VERTICALES Y AGENTES ---
  peritodigital:
    build:
      context: ./PeritoDigital
    container_name: sorsabsa-peritodigital
    env_file: ./PeritoDigital/.env
    volumes:
      - ./PeritoDigital:/app
      - /app/venv
      - ./MemoryPalace/memory/knowledge:/app/knowledge:ro
    networks:
      - sorsabsa-net

  legalconnect:
    build:
      context: ./LegalConnect
    container_name: sorsabsa-legalconnect
    networks:
      - sorsabsa-net

  redessociales:
    build:
      context: ./RedesSociales
    container_name: sorsabsa-redessociales
    env_file: ./RedesSociales/.env
    volumes:
      - ./RedesSociales:/app
      - /app/node_modules
      - /app/venv
      - /app/venv
      - ./MemoryPalace/memory/knowledge:/app/knowledge:ro
    networks:
      - sorsabsa-net

  vetsys:
    build:
      context: ./Vetsys
    container_name: sorsabsa-vetsys
    networks:
      - sorsabsa-net

  academy:
    build:
      context: ./Academy
    container_name: sorsabsa-academy
    networks:
      - sorsabsa-net

  agenteinmobiliario:
    build:
      context: ./AgenteInmobiliario
    container_name: sorsabsa-agenteinmobiliario
    networks:
      - sorsabsa-net

  # --- NOTA DE AUDITORÍA ---
  # n8nMCP: ELIMINADO. Lógica absorbida por el servicio 'conector'.
  # n8n: ELIMINADO del flujo crítico para evitar colisiones de red.

networks:
  sorsabsa-net:
    name: sorsabsa-net
    driver: bridge

volumes:
  db-data: # Para persistencia local si se decide bajar la DB de la nube